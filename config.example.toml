# round_robin — Splitter (Windows 端)
# 复制为 config.toml，放 round_robin.exe 同目录，直接运行即可

mode = "splitter"
log = true                        # 日滚动日志，默认 true；false 关闭文件日志

[splitter]
listen = "127.0.0.1:52030"
# chunk_size = 16384           # 分片大小 (512-65535)，默认 16384

[[splitter.tunnel]]
proxy = "127.0.0.1:52031"
target = "127.0.0.1"
port = 52031

[[splitter.tunnel]]
proxy = "127.0.0.1:52032"
target = "127.0.0.1"
port = 52032

